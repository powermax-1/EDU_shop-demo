<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>GA Teaching Demo – Ecommerce</title>

<style>
body{
font-family: Arial, sans-serif;
background: linear-gradient(to right, #f8fafc, #e2e8f0);
padding: 20px;
margin: 0;
}
h2{
text-align: center;
margin-bottom: 30px;
}

/* Grid Layout */
.grid{
display: grid;
grid-template-columns: repeat(auto-fill, minmax(250px,1fr));
gap: 25px;
}

/* Product Card */
.card{
background: white;
padding: 20px;
border-radius: 12px;
cursor: pointer;
box-shadow: 0 5px 15px rgba(0,0,0,0.08);
transition: all 0.3s ease;
position: relative;
overflow: hidden;
}

/* Hover Effect */
.card:hover{
transform: translateY(-8px);
box-shadow: 0 12px 25px rgba(0,0,0,0.15);
}

/* Click Effect */
.card:active{
transform: scale(0.98);
}

/* Price Styling */
.card p{
font-size: 18px;
font-weight: bold;
color: #2563eb;
}

/* Button Styling */
button{
width: 100%;
padding: 12px;
background: #2563eb;
color: white;
border: none;
margin-top: 15px;
cursor: pointer;
border-radius: 8px;
font-weight: bold;
transition: all 0.3s ease;
}
button:hover{
background: #1e40af;
transform: translateY(-2px);
}
button:active{
transform: scale(0.95);
}

/* Fade animation */
.card{
animation: fadeIn 0.5s ease forwards;
opacity: 0;
}
@keyframes fadeIn{
to{ opacity:1; }
}
</style>

<!-- Google Analytics -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-EQMDD3LYBM"></script>
<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());
gtag('config', 'G-EQMDD3LYBM', { debug_mode: true });
</script>

</head>

<body>

<h2>EduShop GA Teaching Demo</h2>

<div class="grid" id="productGrid"></div>

<script>
const products = [
{ id:'p1', name:'Quantum Headphones', price:299, category:'Electronics'},
{ id:'p2', name:'Cotton Minimalist Tee', price:35, category:'Fashion'},
{ id:'p3', name:'Smart Leather Wallet', price:85, category:'Accessories'},
{ id:'p4', name:'Ultra-Wide Monitor', price:450, category:'Electronics'},
{ id:'p5', name:'Canvas Backpack', price:65, category:'Accessories'}
];

function trackProductView(product){
gtag('event','view_item',{
product_name: product.name
});
console.log("Viewed:", product.name);
}

function addToCart(event,product){
event.stopPropagation();

gtag('event','add_to_cart',{
currency:'INR',
value: product.price,
items:[{
item_id: product.id,
item_name: product.name,
item_category: product.category,
price: product.price,
quantity:1
}]
});

alert(product.name + " added to cart");
}

function renderProducts(){
const grid=document.getElementById("productGrid");

products.forEach(product=>{
const card=document.createElement("div");
card.className="card";
card.onclick=()=>trackProductView(product);

card.innerHTML=`
<h3>${product.name}</h3>
<p>₹${product.price}</p>
<button class="add-btn">Add to Cart</button>
`;

const btn = card.querySelector(".add-btn");
btn.onclick = (e) => addToCart(e, product);

grid.appendChild(card);
});
}

renderProducts();
</script>

</body>
</html>
